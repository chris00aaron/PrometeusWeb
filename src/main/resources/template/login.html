<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoggerPillar - Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome (para el icono en la parte superior) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f7fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-container {
      max-width: 450px;
      width: 100%;
      margin: 5% auto;
      background-color: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo i {
      color: #ff6f00;
    }
    .logo h4 {
      font-size: 1.8rem;
      font-weight: bold;
      color: #333;
    }
    .logo p {
      color: #777;
      font-size: 1rem;
    }
    .form-label {
      font-weight: bold;
      color: #333;
    }
    .btn-custom {
      width: 100%;
      background-color: #ff6f00;
      border-color: #ff6f00;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
    }
    .btn-custom:hover {
      background-color: #e65c00;
      border-color: #e65c00;
    }
    .demo-credentials {
      font-size: 14px;
      color: #555;
      margin-top: 20px;
      text-align: center;
    }
    .demo-credentials p {
      margin: 0;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="login-container">
      <!-- Logo y título -->
      <div class="logo">
        <i class="fas fa-cogs fa-4x"></i> <!-- Icono de engranaje -->
        <h4 class="mt-3">DoggerPillar</h4>
        <p>Electric Motor Control Platform</p>
      </div>

      <!-- Formulario de login -->
      <h5 class="text-center mb-4">Welcome Back</h5>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" placeholder="Enter your username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-custom">Login</button>
      </form>

      <!-- Credenciales de demostración -->
      <div class="demo-credentials">
        <p><strong>DEMO CREDENTIALS</strong></p>
        <p>Admin: admin / admin123</p>
        <p>User: user / user123</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>Professional Electric Motor Design & Manufacturing</p>
  </div>

  <!-- Bootstrap JS y dependencias -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
