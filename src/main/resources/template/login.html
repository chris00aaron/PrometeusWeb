<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogerPillar - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-name {
            color: #0d6efd;
            font-weight: bold;
            font-size: 24px;
        }
        .brand-subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-top: -5px;
        }
        .form-control {
            margin-bottom: 15px;
            padding: 12px;
        }
        .btn-login {
            background-color: #0d6efd;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }
        .demo-credentials {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
        }
        .demo-credentials h6 {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: #6c757d;
            font-size: 14px;
        }
        hr {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="brand-header">
                <div class="brand-name">DogerPillar</div>
                <div class="brand-subtitle">Electric Motor Control Platform</div>
            </div>
            
            <h3 class="text-center mb-4">Welcome Back</h3>
            
            <form>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter your username">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn-login">Login</button>
            </form>
            
            <hr>
            
            <div class="demo-credentials">
                <h6>DEMO CREDENTIALS</h6>
                <div class="row">
                    <div class="col-4"><strong>Admin:</strong></div>
                    <div class="col-8">admin / admin123</div>
                </div>
                <div class="row mt-1">
                    <div class="col-4"><strong>User:</strong></div>
                    <div class="col-8">user / user123</div>
                </div>
            </div>
            
            <div class="footer-text">
                Professional Electric Motor Design & Manufacturing
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (optional, for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
