<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prometeus - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo i {
            color: #ff6f00;
            font-size: 3.5rem;
            margin-bottom: 15px;
        }
        .logo h4 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin: 0;
        }
        .logo p {
            color: #777;
            font-size: 0.95rem;
            margin: 5px 0 0 0;
        }
        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }
        .welcome-text h5 {
            color: #333;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #ff6f00;
            box-shadow: 0 0 0 0.2rem rgba(255, 111, 0, 0.15);
            background-color: #fff;
        }
        .btn-login {
            width: 100%;
            background-color: #ff6f00;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-login:hover {
            background-color: #e65c00;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 111, 0, 0.3);
        }
        .btn-login:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .demo-credentials {
            background-color: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
        }
        .demo-credentials p {
            margin: 0;
            color: #555;
            font-size: 0.9rem;
        }
        .demo-credentials p:first-child {
            margin-bottom: 10px;
            font-weight: 700;
            color: #333;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
            width: 100%;
        }
    </style>
</head>

            <p><strong>Admin:</strong> admin / 123</p>
            <p><strong>Usuario:</strong> user / 123</p>
        </div>
    </div>

    <div class="footer">
        <p>Professional Electric Motor Design & Manufacturing</p>
    </div>
    <script th:src="@{/js/mensaje-error-flotante.js}" defer></script>

        <script>
            const API_URL = 'http://localhost:3030/api';

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const clave = document.getElementById('password').value.trim();
                const loginBtn = document.getElementById('loginBtn');
                const errorMessage = document.getElementById('errorMessage');

                loginBtn.disabled = true;
                errorMessage.classList.remove('show');

                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, clave })
                    });

                    const data = await response.json();

                    if (data.success && data.data) {
                        localStorage.setItem('user', JSON.stringify(data.data));
                        console.log('Usuario guardado en localStorage:', localStorage.getItem('user'));
                        window.location.href = 'vUsuarioPrincipal.html';
                    } else {
                        errorMessage.textContent = data.error || 'Error en inicio de sesión';

                    }
                } catch (err) {
                    errorMessage.textContent = 'Error de conexión: ' + err.message;
                    errorMessage.classList.add('show');
                } finally {
                    loginBtn.disabled = false;
                }
            });
