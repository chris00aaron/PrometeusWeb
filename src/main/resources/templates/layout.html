<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(pageTitle, extraStyles)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="keywords" content="Dogger Pillar, Prometeus, ML, IA, Predicción, Monitoreo, Carga Masiva" />
    <meta name="author" content="COGNITECH" />
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">

    <title th:text="${pageTitle}">Default Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />

    <!-- Inserta estilos adicionales si un template los pasa -->
    <th:block th:if="${extraStyles != null}">
        <th:block th:replace="${extraStyles}"></th:block>
    </th:block>
</head>

<body th:fragment="layout(pageTitle, content, extraScripts)">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-content">
            <div class="logo">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0id2hpdGUiPjxwYXRoIGQ9Ik0xMiAyTDIgN2wxMCA1IDEwLTUtMTAtNXptMCA5bC0xMCA1IDEwIDUgMTAtNS0xMC01eiIvPjwvc3ZnPg=="
                    alt="Logo" />
                <div class="logo-text">
                    <h5>DOGGER PILLAR</h5>
                    <small>Menu</small>
                </div>
            </div>
            <div class="nav-item">
                <a th:href="@{/predict}" class="nav-link">
                    <i class="fas fa-file-csv"></i> Predicción
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/predict/cargar}" class="nav-link">
                    <i class="fas fa-file-csv"></i> Carga Masiva
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/monitoreo}" class="nav-link">
                    <i class="fas fa-chart-line"></i> Monitoreo
                </a>
            </div>
            <div class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                <a th:href="@{/dashboard}" class="nav-link">
                    <i class="fas fa-home"></i> Dashboard
                </a>
            </div>
            <div class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                <a th:href="@{/admin/usuarios/nuevo}" class="nav-link">
                    <i class="fas fa-cog"></i> Registrar
                </a>
            </div>
            <div class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                <a th:href="@{/admin/auditorias}" class="nav-link">
                    <i class="fas fa-clipboard-list"></i> Auditorías
                </a>
            </div>
            <form th:action="@{/logout}" method="post">
                <button class="logout-btn mt-auto mb-3">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </form>
        </div>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div class="main-content">
        <div th:replace="${content}"></div>
    </div>

    <!-- Inserta codigo js adicionales si un template los pasa -->
    <th:block th:if="${extraScripts != null}">
        <th:block th:replace="${extraScripts}"></th:block>
    </th:block>
</body>

</html>
